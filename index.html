<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking Voxel AR</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">◈</span>
                <h1>Hand Tracking Voxel AR</h1>
            </div>
            <div class="status-bar">
                <span id="fps-counter">FPS: --</span>
                <span id="voxel-count">Voxels: 0</span>
            </div>
        </header>

        <main class="main-content">
            <div class="video-container">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="mediapipe-canvas"></canvas>
                <canvas id="three-canvas"></canvas>
            </div>
            
            <aside class="controls-panel">
                <div class="panel-section">
                    <h3>Controls</h3>
                    <div class="control-group">
                        <label>Camera</label>
                        <button id="start-camera" class="btn primary">Start Camera</button>
                    </div>
                    <div class="control-group">
                        <label>Tracking</label>
                        <button id="start-tracking" class="btn secondary" disabled>Start Tracking</button>
                    </div>
                    <div class="control-group">
                        <label>Actions</label>
                        <button id="clear-voxels" class="btn danger">Clear All Voxels</button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>Settings</h3>
                    <div class="control-group">
                        <label for="pinch-threshold">Pinch Threshold</label>
                        <input type="range" id="pinch-threshold" min="0.02" max="0.15" step="0.01" value="0.05">
                        <span id="pinch-value">0.05</span>
                    </div>
                    <div class="control-group">
                        <label for="voxel-size">Voxel Size</label>
                        <input type="range" id="voxel-size" min="0.02" max="0.2" step="0.01" value="0.08">
                        <span id="voxel-size-value">0.08</span>
                    </div>
                    <div class="control-group">
                        <label for="camera-flip">Flip Camera</label>
                        <input type="checkbox" id="camera-flip" checked>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>Gesture Guide</h3>
                    <div class="gesture-guide">
                        <div class="gesture">
                            <span class="gesture-icon">🤏</span>
                            <span>Pinch = Create Voxel</span>
                        </div>
                        <div class="gesture">
                            <span class="gesture-icon">✋</span>
                            <span>Open Hand = Move Voxel</span>
                        </div>
                        <div class="gesture">
                            <span class="gesture-icon">✌️</span>
                            <span>Peace = Delete Last</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="loader">
                <div class="spinner"></div>
                <p>Loading MediaPipe...</p>
            </div>
        </div>

        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="hand_tracker.js"></script>
    <script src="voxel_manager.js"></script>
    <script src="app.js"></script>
</body>
</html>
